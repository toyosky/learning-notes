# ── 站点配置 ──────────────────────────────────────────────────
site_name: 学习笔记
site_description: AI大模型 & 量化交易学习笔记
site_url: https://toyosky.github.io/learning-notes
repo_url: https://github.com/toyosky/learning-notes
edit_uri: edit/main/
docs_dir: docs

# ── 排除非文档文件 ───────────────────────────────────────────
exclude_docs: |
  /.github/
  /.obsidian/
  /.omo/
  /.hermes/
  /.archive/
  /.venv/
  /2-quant-trading/.venv/
  /2-quant-trading/02-backtest/code/*.csv
  /2-quant-trading/02-backtest/code/*.txt
  mkdocs.yml
  .gitignore

# ── 主题 ─────────────────────────────────────────────────────
theme:
  name: material
  language: zh
  icon:
    logo: material/book-open-variant
    repo: fontawesome/brands/github
  favicon: assets/favicon.png
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式

# ── Hook: 修复 roamlinks 对符号链接的支持 ─────────────────
hooks:
  - hooks/fix_roamlinks.py

# ── 插件 ─────────────────────────────────────────────────────
plugins:
  - search
  - roamlinks
  - glightbox

# ── Markdown 扩展 ────────────────────────────────────────────
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: "¶"

# ── MathJax ──────────────────────────────────────────────────
extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js

# ── 导航 ─────────────────────────────────────────────────────
nav:
  - 首页: README.md
  - 学习路线: 0-index/roadmap.md
  - AI 学习:
    - Transformer 结构拆解: 1-ai-learning/1.1-transformer-internals.md
    - LLM → VLM 演进: 1-ai-learning/1.2-llm-to-vlm.md
    - LoRA 微调入门: 1-ai-learning/1.3-lora-intro.md
    - LoRA 数学原理: 1-ai-learning/1.4-lora-math.md
    - VLM 自动驾驶场景分析: 1-ai-learning/1.5-vlm-driving-analysis.md
  - 量化交易:
    - 总览: 2-quant-trading/README.md
    - 数据获取:
      - akshare 数据获取: 2-quant-trading/01-data/notes/akshare-basics.md
      - 前复权 vs 后复权: 2-quant-trading/01-data/deep/forward-vs-backward-adjustment.md
    - 策略回测:
      - DCA 定投回测: 2-quant-trading/02-backtest/notes/dca-backtest.md
      - 均线交叉策略回测: 2-quant-trading/02-backtest/notes/ma-crossover-backtest.md
      - 三资产宏观分析: 2-quant-trading/02-backtest/notes/macro-analysis.md
      - 风险平价 vs 动量排名: 2-quant-trading/02-backtest/notes/portfolio-allocation.md
      - 再平衡频率研究: 2-quant-trading/02-backtest/notes/portfolio-rebalance.md
      - 止损保护与风险管理: 2-quant-trading/02-backtest/notes/portfolio-risk.md
